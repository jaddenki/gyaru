<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>gyaru world</title>
        <link rel="stylesheet" href="/style/global.css" />
        <link rel="stylesheet" href="/style/screens.css" />
        <link rel="stylesheet" href="/style/modal.css" />
        <link rel="stylesheet" href="/style/ui.css" />
    </head>
    <body>
        <!-- SCREEN 1: TITLE -->
        <div id="screen-title" class="screen">
            <p id="title-tagline"></p>
            <button id="btn-enter"></button>
        </div>

        <!-- SCREEN 2: ONBOARDING -->
        <div id="screen-onboard" class="screen">
            <div id="onboard-step-1" class="onboard-step">
                <p id="step1-label"></p>
                <div id="base-options"></div>
                <button id="btn-next-1" class="btn-next"></button>
            </div>
            <div id="onboard-step-2" class="onboard-step" style="display: none">
                <p id="step2-label"></p>
                <div id="substyle-options"></div>
                <button id="btn-back-2" class="btn-back"></button>
                <button id="btn-next-2" class="btn-next"></button>
            </div>
            <div id="onboard-step-3" class="onboard-step" style="display: none">
                <p id="step3-label"></p>
                <input id="name-input" type="text" />
                <button id="btn-back-3" class="btn-back"></button>
                <button id="btn-finish"></button>
            </div>
            <div id="progress-dots">
                <span class="dot active" data-step="1">1</span>
                <span class="dot" data-step="2">2</span>
                <span class="dot" data-step="3">3</span>
            </div>
        </div>

        <!-- SCREEN 3: SHIBUYA MAP -->
        <div id="screen-map" class="screen">
            <div id="map-header">
                <span id="player-badge"></span>
                <p id="map-hint"></p>
            </div>
            <!-- Zones + dialogue layer generated dynamically -->
            <div
                id="map-container"
                style="
                    position: relative;
                    width: 100%;
                    height: 80vh;
                    border: 1px solid #ccc;
                "
            >
                <div
                    id="dialogue-layer"
                    style="
                        display: none;
                        position: absolute;
                        top: 0;
                        left: 0;
                        width: 100%;
                        height: 100%;
                    "
                >
                    <div id="dialogue-characters"></div>
                    <div id="bubble-container"></div>
                    <button id="btn-dialogue-next"></button>
                </div>
            </div>
        </div>

        <!-- MODAL OVERLAY -->
        <div
            id="modal-overlay"
            style="
                display: none;
                position: fixed;
                top: 0;
                left: 0;
                width: 100%;
                height: 100%;
                background: rgba(0, 0, 0, 0.5);
            "
        >
            <div
                id="modal-panel"
                style="
                    background: #fff;
                    margin: 10% auto;
                    padding: 20px;
                    max-width: 600px;
                "
            >
                <button id="btn-modal-close" style="float: right"></button>
                <h2 id="modal-title"></h2>
                <p id="modal-subtitle"></p>
                <div id="modal-body"></div>
                <div id="modal-tags"></div>
                <div id="modal-timeline"></div>
            </div>
        </div>

        <script type="module" src="/src/js/main.ts"></script>
    </body>
</html>
