<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>gyaru world</title>
        <link rel="preconnect" href="https://fonts.googleapis.com" />
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
        <link
            href="https://fonts.googleapis.com/css2?family=LINE+Seed+JP:wght@400&display=swap"
            rel="stylesheet"
        />
        <link rel="stylesheet" href="/style/global.css" />
        <link rel="stylesheet" href="/style/screens.css" />
        <link rel="stylesheet" href="/style/modal.css" />
        <link rel="stylesheet" href="/style/ui.css" />
        <link rel="stylesheet" href="/style/magazine.css" />
    </head>
    <body>
        <!-- SCREEN 1: TITLE -->
        <div id="screen-title" class="screen">
            <p id="title-tagline"></p>
            <button id="btn-enter"></button>
        </div>

        <!-- SCREEN 2: ONBOARDING -->
        <div id="screen-onboard" class="screen">
            <div id="onboard-step-1" class="onboard-step">
                <p id="step1-label"></p>
                <div id="base-options"></div>
                <button id="btn-next-1" class="btn-next"></button>
            </div>
            <div id="onboard-step-2" class="onboard-step" style="display: none">
                <p id="step2-label"></p>
                <div id="substyle-options"></div>
                <button id="btn-back-2" class="btn-back"></button>
                <button id="btn-next-2" class="btn-next"></button>
            </div>
            <div id="onboard-step-3" class="onboard-step" style="display: none">
                <p id="step3-label"></p>
                <input id="name-input" type="text" />
                <button id="btn-back-3" class="btn-back"></button>
                <button id="btn-finish"></button>
            </div>
            <div id="progress-dots">
                <span class="dot active" data-step="1">1</span>
                <span class="dot" data-step="2">2</span>
                <span class="dot" data-step="3">3</span>
            </div>
        </div>

        <!-- SCREEN 3: SHIBUYA MAP -->
        <div id="screen-map" class="screen">
            <div class="map-screen-middle">
            <!-- Zones + dialogue layer generated dynamically -->
            <div id="map-container">
                <div class="map-hero-title" role="heading" aria-level="1">
                    <div class="map-star-field" aria-hidden="true"></div>
                    <span class="map-hero-title__line">Shibuya</span>
                    <button
                        type="button"
                        class="map-hero-title__line map-hero-title__line--sub map-hero-title__sparkle-btn"
                        aria-label="Gyaru World — tap for sparkles"
                    >
                        Gyaru World
                    </button>
                </div>
                <div id="map-stage" class="map-stage"></div>
            </div>
            </div>
            <!-- Full-screen dim/blur; inner #dialogue-scene matches map box for bubble positions -->
            <div id="dialogue-layer">
                <div
                    id="dialogue-backdrop"
                    class="dialogue-backdrop"
                    aria-hidden="true"
                ></div>
                <div
                    id="dialogue-intro"
                    class="dialogue-intro"
                    hidden
                    role="dialog"
                    aria-modal="true"
                    aria-labelledby="dialogue-intro-title"
                >
                    <div class="dialogue-intro-card">
                        <h2 id="dialogue-intro-title" class="dialogue-intro-title">
                            Interview
                        </h2>
                        <p
                            id="dialogue-intro-body"
                            class="dialogue-intro-body"
                        ></p>
                    </div>
                </div>
                <div class="dialogue-scene-rail">
                    <div id="dialogue-scene">
                        <aside
                            id="dialogue-tldr"
                            class="dialogue-tldr"
                            aria-live="polite"
                            aria-atomic="true"
                            hidden
                        >
                            <p class="dialogue-tldr__label"></p>
                        </aside>
                        <div id="dialogue-characters"></div>
                        <div id="bubble-container">
                            <div
                                id="dialogue-scroll"
                                class="dialogue-scroll"
                                role="log"
                                aria-relevant="additions"
                                aria-live="polite"
                            ></div>
                        </div>
                    </div>
                </div>
                <!-- Fixed above intro/scene stacking so Continue / Next stays clickable -->
                <button id="btn-dialogue-next" type="button"></button>
            </div>
            <footer id="map-footer">
                <p id="map-hint"></p>
            </footer>
        </div>

        <!-- MODAL OVERLAY -->
        <div id="modal-overlay">
            <div id="modal-panel">
                <button id="btn-modal-close" style="float: right"></button>
                <h2 id="modal-title"></h2>
                <p id="modal-subtitle"></p>
                <div id="modal-body"></div>
                <div id="modal-tags"></div>
                <div id="modal-timeline"></div>
            </div>
        </div>

        <!-- MAGAZINE OVERLAY -->
        <div id="magazine-overlay">
            <div id="magazine-container">
                <button id="btn-magazine-close">×</button>
                <div id="magazine-cover-row">
                    <div id="magazine-cover">
                        <img id="magazine-cover-img" src="/assets/ui/magazine/0.png" alt="egg magazine cover" />
                        <p id="magazine-cover-caption"></p>
                    </div>
                    <button id="btn-magazine-open" class="magazine-arrow">→</button>
                </div>
                <div id="magazine-spread" style="display:none">
                    <button id="btn-magazine-prev" class="magazine-arrow">←</button>
                    <img id="magazine-spread-img" alt="magazine spread" />
                    <button id="btn-magazine-next" class="magazine-arrow">→</button>
                </div>
            </div>
        </div>

        <script type="module" src="/src/js/main.ts"></script>
    </body>
</html>
